<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive | Digital Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              glass: 'rgba(255, 255, 255, 0.05)',
              'glass-border': 'rgba(255, 255, 255, 0.1)',
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-[#050505] text-white antialiased selection:bg-white/30">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#050505] z-[100] flex items-center justify-center transition-opacity duration-700">
      <div class="flex flex-col items-center gap-6">
        <div class="w-12 h-12 border-2 border-white/10 border-t-white rounded-full animate-spin"></div>
        <span class="text-[10px] uppercase tracking-[0.5em] text-white/40 animate-pulse">Archiving Sanctuary</span>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
